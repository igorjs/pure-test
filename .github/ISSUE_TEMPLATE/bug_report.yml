name: Bug Report
description: Report a bug or unexpected behaviour.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the sections below so we can reproduce and fix it.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal Reproduction
      description: Provide the smallest possible code that reproduces the bug.
      placeholder: |
        ```ts
        import { Ok } from '@igorjs/pure-test'
        // steps to reproduce...
        ```
      render: typescript
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      description: Which runtime(s) does this occur on?
      multiple: true
      options:
        - Node.js 22
        - Node.js 24
        - Node.js 25
        - Deno
        - Bun
        - Cloudflare Workers
        - Browser
    validations:
      required: true

  - type: input
    id: runtime-version
    attributes:
      label: Runtime Version
      description: "e.g. Node 24.14.0, Deno 2.7.5"
      placeholder: "node --version / deno --version / bun --version"
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: Package Version
      description: "Which version of the package are you using?"
      placeholder: "0.10.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15.4, Ubuntu 24.04, Windows 11"
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error Output
      description: Paste the full error message or stack trace.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information that might help (screenshots, related issues, workarounds).
    validations:
      required: false
