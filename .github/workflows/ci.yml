name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Node matrix (4 jobs) ──────────────────────────────────────────────────
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 23, 24, 25, 26]
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint & format
        run: pnpm run lint

      - name: Type-check
        run: pnpm run check

      - name: Build
        run: pnpm run build

      - name: Unit tests
        run: pnpm test

      - name: Only tests
        run: node tests/only-test.mjs

      - name: Grep tests
        run: node tests/grep-test.mjs

      - name: Upload dist
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── Deno (2 jobs) ─────────────────────────────────────────────────────────
  test-deno:
    needs: lint-and-test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        deno-version: [v2.x, canary]
    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ matrix.deno-version }}

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Unit tests (Deno ${{ matrix.deno-version }})
        run: deno run --allow-all tests/self-test.mjs

      - name: Adapter smoke test (Deno ${{ matrix.deno-version }})
        run: deno test --allow-read tests/deno-adapter.test.mjs

  # ── Bun (2 jobs) ──────────────────────────────────────────────────────────
  test-bun:
    needs: lint-and-test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bun-version: [latest, canary]
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Unit tests (Bun ${{ matrix.bun-version }})
        run: bun tests/self-test.mjs

  # ── Cloudflare Workers (miniflare) ────────────────────────────────────────
  test-workers:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Workers smoke test
        run: node tests/worker-test.mjs

  # ── Browser (Chromium via Playwright) ─────────────────────────────────────
  test-browser:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Browser smoke test
        run: node tests/browser-test.mjs
