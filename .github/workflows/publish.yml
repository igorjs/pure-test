name: Publish

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Validate tag format
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::Tag must be semver: v1.2.3 (got $GITHUB_REF_NAME)"
            exit 1
          fi

      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - run: pnpm install --frozen-lockfile

      - name: Lint & format
        run: pnpm run lint

      - name: Type-check
        run: pnpm run check

      - name: Build
        run: pnpm run build

      - name: Runtime tests
        run: pnpm test

      - name: Type tests
        run: pnpm run test:types

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: publish-dist
          path: |
            dist/
            package.json
          retention-days: 1

  publish-npm:
    needs: verify
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - uses: actions/download-artifact@v8
        with:
          name: publish-dist

      - name: Publish to npm
        # --ignore-scripts skips the prepublishOnly hook (which runs `pnpm run lint`
        # and would fail because devDependencies are not installed in this job).
        # The `verify` job already runs lint, type-check, build, and all tests.
        run: |
          for i in 1 2 3; do
            npm publish --provenance --access public --ignore-scripts && exit 0
            echo "::warning::npm publish attempt $i failed, retrying in 15s..."
            sleep 15
          done
          exit 1
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-gpr:
    # Gated on publish-npm: npm is the canonical registry; if its publish or
    # provenance attestation fails we should not advertise the version on GPR.
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: '@igorjs'

      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - uses: actions/download-artifact@v8
        with:
          name: publish-dist

      - name: Publish to GitHub Packages
        # --ignore-scripts: same rationale as publish-npm; verify already
        # validated everything, so skip the prepublishOnly hook.
        run: |
          for i in 1 2 3; do
            pnpm publish --no-git-checks --ignore-scripts && exit 0
            echo "::warning::GPR publish attempt $i failed, retrying in 15s..."
            sleep 15
          done
          exit 1
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-jsr:
    # Gated on publish-npm: same rationale as publish-gpr; npm is the source
    # of truth for whether the release went out.
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - uses: actions/download-artifact@v8
        with:
          name: publish-dist

      - name: Publish to JSR
        run: |
          for i in 1 2 3; do
            npx jsr publish && exit 0
            echo "::warning::JSR publish attempt $i failed, retrying in 30s..."
            sleep 30
          done
          exit 1

  sync-version:
    needs: [publish-npm, publish-gpr, publish-jsr]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          persist-credentials: true

      - name: Bump version in package.json
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Commit and push
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json jsr.json
          git diff --staged --quiet && echo "Already at v${VERSION}" && exit 0
          git commit -m "chore: bump version to ${VERSION} [skip ci]"
          git push origin main
